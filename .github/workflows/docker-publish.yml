name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE: prokittikun/cost-expenses-tracker

jobs:
  docker:
    runs-on: ubuntu-latest
    # Only publish from this repo (skip on forks that lack the secrets).
    if: github.repository_owner == 'prokittikun'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # latest + short SHA on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            # semver tags when pushing v1.2.3 (also produces 1.2 and 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
