name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Build never connects to a DB (prisma generate is offline; plan pages are
      # server-rendered on demand), but Next/Prisma need these vars to be present.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
